<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Posty — Your Content Companion</title>
<meta name="description" content="Meet Posty — your AI content companion. Talk about your business and get social media content for every platform.">
<meta property="og:title" content="Posty — Your Content Companion">
<meta property="og:description" content="Your personal social media manager. Tell me about what you do and I'll take it from there.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://meetposty.com">
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  color: #fff;
  background: #0d0618;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  height: 100dvh;
}

a { color: inherit; text-decoration: none; }

/* Full-screen wrapper */
.screen {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

/* Pricing link top right */
.top-nav {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  padding: 16px 20px;
  display: flex;
  justify-content: flex-end;
}
.pricing-link {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  padding: 8px 18px;
  border-radius: 100px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: background 0.2s;
}
.pricing-link:hover {
  background: rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.85);
}

/* Posty image — fills top portion, purple bg blends into page */
.hero-image {
  position: absolute;
  top: -7%;
  left: -5%;
  width: 110%;
  height: 85%;
  z-index: 0;
}
.hero-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 30%;
}

/* Gradient overlay — exact app gradient */
.gradient-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(13,6,24,0) 35%,
    rgba(13,6,24,0.7) 55%,
    rgba(13,6,24,0.95) 70%,
    #0d0618 82%
  );
}

/* Content anchored to bottom */
.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 2;
  padding: 0 24px 40px;
}

.greeting {
  font-size: 18px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  margin-bottom: 6px;
}

.headline {
  font-size: 40px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.headline .accent {
  color: #E1306C;
  font-weight: 800;
}

.subtitle {
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  line-height: 1.47;
  margin-bottom: 28px;
}

/* CTA button with spinning gradient border */
.cta-wrap {
  display: block;
  height: 56px;
  border-radius: 16px;
  overflow: hidden;
  padding: 2px;
  position: relative;
}
.cta-wrap:hover .cta { background: rgba(6,8,10,0.5); }

.cta-border {
  position: absolute;
  inset: -300%;
  background: conic-gradient(
    from 0deg,
    #F77737, #F77737,
    #E1306C,
    #833AB4,
    #E1306C,
    #F77737, #F77737
  );
  animation: spin 10s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.cta {
  position: relative;
  height: 100%;
  border-radius: 14px;
  background: rgba(6,8,10,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: background 0.2s;
}
.cta::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(247,119,55,0.15), rgba(225,48,108,0.08), rgba(131,58,180,0.15));
}
.cta-text {
  position: relative;
  font-size: 17px;
  font-weight: 600;
  color: #FFFFFF;
  display: flex;
  align-items: center;
  gap: 10px;
}
.cta-text svg { width: 22px; height: 22px; }

/* Bottom links */
.bottom-links {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 18px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.bottom-links a {
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.3);
  transition: color 0.2s;
}
.bottom-links a:hover { color: rgba(255,255,255,0.55); }

/* On desktop: center as a phone frame */
@media (min-width: 768px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #060210;
  }
  .screen {
    max-width: 400px;
    max-height: 860px;
    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 0 80px rgba(131,58,180,0.1);
  }
  .content { padding-bottom: 32px; }
}
</style>
</head>
<body>

<div class="screen">
  <!-- Pricing top right -->
  <div class="top-nav">
    <a href="#pricing" class="pricing-link">Pricing</a>
  </div>

  <!-- Posty full-bleed image -->
  <div class="hero-image">
    <img src="posty-smiling.jpg" alt="Posty">
  </div>

  <!-- Gradient fade -->
  <div class="gradient-overlay"></div>

  <!-- Content -->
  <div class="content">
    <div class="greeting">Hey there!</div>
    <h1 class="headline">I'm <span class="accent">Posty</span></h1>
    <p class="subtitle">Your personal social media manager.
Tell me about what you do and I'll take it from there — strategy, content, posting, all of it.</p>

    <a href="#" class="cta-wrap">
      <div class="cta-border"></div>
      <div class="cta">
        <span class="cta-text">
          <svg viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Download on the App Store
        </span>
      </div>
    </a>

    <div class="bottom-links">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/deletion">Data Deletion</a>
      <a href="mailto:davidtza100@gmail.com">Contact</a>
    </div>
  </div>
</div>

</body>
</html>
